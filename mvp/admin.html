<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin – Start Survey Calls</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 720px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-3">Start Survey Calls</h4>

            <form method="POST" action="/admin/calls/start">
                <div class="mb-3">
                    <label class="form-label">Phone Numbers</label>
                    <textarea
                        name="phones"
                        class="form-control"
                        rows="6"
                        placeholder="+919XXXXXXXXX&#10;+918XXXXXXXXX"
                        required></textarea>
                    <div class="form-text">
                        Enter one phone number per line (E.164 format).
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Start Calls
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
